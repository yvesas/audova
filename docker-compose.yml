services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - audio:/data/audio

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - audio:/data/audio # shares the temporary audio with web

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: audova
      POSTGRES_PASSWORD: audova
      POSTGRES_DB: audova
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audova"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional (Phase 5): robust queue
  # redis:
  #   image: redis:7-alpine
  #   ports: ["6379:6379"]

volumes:
  pgdata:
  audio:
